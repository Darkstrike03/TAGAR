name: tagar
description: "Tagar — A nature-inspired communication app."
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  google_fonts: ^6.2.0
  cached_network_image: ^3.3.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.0
  uuid: ^4.2.0
  http: ^1.2.0
  crypto: ^3.0.0
  path_provider: ^2.1.0
  package_info_plus: ^8.0.0
  supabase_flutter: ^2.5.0
  flutter_dotenv: ^5.1.0
  mobile_scanner: ^6.0.0
  qr_flutter: ^4.1.0
  image_picker: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  windows:
    generate: true
    icon_size: 48
  image_path: "lib/assets/logo.png"
  adaptive_icon_background: "#F7F5F0"

flutter:
  uses-material-design: true
  assets:
    - lib/assets/logo.png
    - lib/assets/logo2.png
    - .env
