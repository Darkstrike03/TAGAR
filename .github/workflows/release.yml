name: Build & Release

on:
  push:
    tags:
      - 'v[0-9]*'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          cache: true

      - run: flutter pub get

      - run: flutter build apk

      - name: Compute SHA256
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk .
          sha256sum app-release.apk | cut -d' ' -f1 > android-checksum.txt

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            app-release.apk
            android-checksum.txt

  build-windows:
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          cache: true

      - run: flutter pub get

      - run: flutter build windows

      - name: Extract version
        id: version
        run: |
          $pubspec = Get-Content pubspec.yaml
          $v = ($pubspec | Select-String '^version: ').ToString().Split(' ')[1].Split('+')[0]
          echo "name=$v" >> $env:GITHUB_OUTPUT

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Build installer & checksum
        run: |
          iscc windows\installer\setup.iss /DMyAppVersion=${{ steps.version.outputs.name }}
          Copy-Item build\installer\tagar-setup-*.exe tagar-setup.exe
          (Get-FileHash tagar-setup.exe -Algorithm SHA256).Hash.ToLower() > windows-checksum.txt

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            tagar-setup.exe
            windows-checksum.txt

  release:
    needs: [build-android, build-windows]
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          echo "name=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')" >> $GITHUB_OUTPUT
          echo "code=$(grep '^version: ' pubspec.yaml | sed 's/.*+//')" >> $GITHUB_OUTPUT

      - name: Update update_manifest.json
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          VERSION="${{ steps.version.outputs.name }}"
          VCODE=${{ steps.version.outputs.code }}

          APK_URL="https://github.com/$REPO/releases/download/$TAG/app-release.apk"
          WIN_URL="https://github.com/$REPO/releases/download/$TAG/tagar-setup.exe"
          ANDROID_SHA=$(cat android-checksum.txt | tr -d '\n')
          WINDOWS_SHA=$(cat windows-checksum.txt | tr -d '\n')

          cat > update_manifest.json <<EOF
          {
            "latestVersion": "$VERSION",
            "versionCode": $VCODE,
            "minVersionCode": 1,
            "downloadUrl": {
              "android": "$APK_URL",
              "windows": "$WIN_URL"
            },
            "sha256Checksum": {
              "android": "$ANDROID_SHA",
              "windows": "$WINDOWS_SHA"
            },
            "releaseNotes": ""
          }
          EOF

      - name: Push updated manifest
        if: github.ref_type == 'tag'
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "Update manifest for ${{ github.ref_name }} [skip ci]"
          file_pattern: update_manifest.json

      - name: Create Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-release.apk
            tagar-setup.exe
          generate_release_notes: true
